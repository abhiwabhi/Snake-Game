<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #0f0;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0f0;
            letter-spacing: 4px;
        }

        #gameCanvas {
            border: 4px solid #0f0;
            box-shadow: 0 0 20px #0f0;
            background: #001a00;
        }

        .score-board {
            margin-top: 20px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .score-item {
            text-shadow: 0 0 5px #0f0;
        }

        .controls {
            margin-top: 15px;
            font-size: 16px;
            color: #0a0;
        }

        .game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 3px solid #0f0;
            box-shadow: 0 0 30px #0f0;
            text-align: center;
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #f00;
            text-shadow: 0 0 10px #f00;
        }

        .game-over p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .game-over button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px #0f0;
        }

        .game-over button:hover {
            background: #0a0;
            box-shadow: 0 0 20px #0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 SNAKE 🐍</h1>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="score-board">
            <div class="score-item">SCORE: <span id="score">0</span></div>
            <div class="score-item">HIGH SCORE: <span id="highScore">0</span></div>
        </div>
        <div class="controls">
            Use W-A-S-D to move | Press SPACE to pause
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER!</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('gameOver');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const finalScoreElement = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let velocityX = 1;
        let velocityY = 0;
        let food = {x: 15, y: 15};
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = true;
        let isPaused = false;
        let gameSpeed = 100;

        highScoreElement.textContent = highScore;

        // Handle keyboard input
        document.addEventListener('keydown', handleKeyPress);

        function handleKeyPress(e) {
            const key = e.key.toLowerCase();

            if (key === ' ') {
                e.preventDefault();
                isPaused = !isPaused;
                return;
            }

            if (isPaused) return;

            switch(key) {
                case 'w':
                    if (velocityY === 0) {
                        velocityX = 0;
                        velocityY = -1;
                    }
                    break;
                case 's':
                    if (velocityY === 0) {
                        velocityX = 0;
                        velocityY = 1;
                    }
                    break;
                case 'a':
                    if (velocityX === 0) {
                        velocityX = -1;
                        velocityY = 0;
                    }
                    break;
                case 'd':
                    if (velocityX === 0) {
                        velocityX = 1;
                        velocityY = 0;
                    }
                    break;
            }
        }

        function drawGame() {
            if (!gameRunning || isPaused) return;

            // Move snake
            const head = {x: snake[0].x + velocityX, y: snake[0].y + velocityY};

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Check self collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
                
                // Increase speed slightly
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                }
            } else {
                snake.pop();
            }

            // Clear canvas
            ctx.fillStyle = '#001a00';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#003300';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#0f0' : '#0a0';
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                
                // Add glow effect to head
                if (index === 0) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#0f0';
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(
                        segment.x * gridSize + 1,
                        segment.y * gridSize + 1,
                        gridSize - 2,
                        gridSize - 2
                    );
                    ctx.shadowBlur = 0;
                }
            });

            // Draw food
            ctx.fillStyle = '#f00';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#f00';
            ctx.fillRect(
                food.x * gridSize + 2,
                food.y * gridSize + 2,
                gridSize - 4,
                gridSize - 4
            );
            ctx.shadowBlur = 0;
        }

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            
            food = newFood;
        }

        function endGame() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
            
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            snake = [{x: 10, y: 10}];
            velocityX = 1;
            velocityY = 0;
            food = {x: 15, y: 15};
            score = 0;
            gameSpeed = 100;
            scoreElement.textContent = score;
            gameRunning = true;
            isPaused = false;
            gameOverScreen.style.display = 'none';
            gameLoop();
        }

        function gameLoop() {
            if (!gameRunning) return;
            
            drawGame();
            setTimeout(gameLoop, gameSpeed);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
